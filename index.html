<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="נני">
<meta name="theme-color" content="#c17b3f">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3159/3159066.png">
<title>ניהול לקוחות — נני</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBHvTh0GR1FXnDgLeXnO-eJI3seWDTONuQ",
    authDomain: "nanny-cm.firebaseapp.com",
    projectId: "nanny-cm",
    storageBucket: "nanny-cm.firebasestorage.app",
    messagingSenderId: "329877497783",
    appId: "1:329877497783:web:ce78da02238784ce8cea32"
  };
  firebase.initializeApp(firebaseConfig);
  window.db = firebase.firestore();

  // Save to Firestore
  window.saveToCloud = function(key, data) {
    if (window.db) {
      window.db.collection("data").doc(key).set({ items: data })
        .catch(e => console.error("Save error:", e));
    }
  };

  // Load from Firestore then render
  window.loadFromCloud = async function(callback) {
    try {
      const leadsDoc = await window.db.collection("data").doc("leads").get();
      if (leadsDoc.exists) {
        localStorage.setItem("nanny_leads", JSON.stringify(leadsDoc.data().items || []));
      }
      const clientsDoc = await window.db.collection("data").doc("clients").get();
      if (clientsDoc.exists) {
        localStorage.setItem("nanny_clients", JSON.stringify(clientsDoc.data().items || []));
      }
    } catch(e) { console.error("Load error:", e); }
    callback();
  };
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f3ee; direction: rtl; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const STATUSES = ["חדש","פניתי","פנו אליי","נקבעה שיחת טלפון","התקיימה שיחת טלפון","נקבעה פגישה","התקיימה פגישה","לא מתאים","גויסתי"];
const STATUS_NEEDS_SCHEDULE = ["נקבעה שיחת טלפון","נקבעה פגישה"];
const WEEKDAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי"];
const CONS_OPTIONS = ["נוכחות הורית","בעלי חיים","סביבת עבודה","אין מעלית","אחר"];
const CHECKBOXES = ["ללא נוכחות הורית","מודל שכר","צורת תשלום","חופשות","חודש נסיון"];
const CLIENT_RESPONSIBILITIES = ["טיפול בילדים","בישול","קניות","קיפול כביסה","מקלחות"];
const CLIENT_SHIFT = ["בוקר","צהריים","אחה\"צ","ערב","לילה"];
const CLIENT_PAY_MODEL = ["שעתי","גלובאלי"];
const COLORS = ["#F4A7B9","#FBBF77","#A8D8B9","#A0C4FF","#C9B1E8","#FFD580","#B5EAD7","#FFB7B2","#C7F2A4","#FFC8DD"];
const COLORS_BG = COLORS.map(c => c + "55");

const statusStyle = {
  "חדש":{bg:"#e3f2fd",color:"#1565c0"},"פניתי":{bg:"#e8eaf6",color:"#283593"},
  "פנו אליי":{bg:"#f3e5f5",color:"#6a1b9a"},"נקבעה שיחת טלפון":{bg:"#fff8e1",color:"#f57f17"},
  "התקיימה שיחת טלפון":{bg:"#fff3e0",color:"#e65100"},"נקבעה פגישה":{bg:"#e8f5e9",color:"#2e7d32"},
  "התקיימה פגישה":{bg:"#e0f2f1",color:"#00695c"},"לא מתאים":{bg:"#fce4ec",color:"#b71c1c"},
  "גויסתי":{bg:"#1b5e20",color:"white"}
};
const scoreStyle = s => { const n=parseInt(s); return n>=7?{bg:"#e8f5e9",color:"#2e7d32"}:n>=5?{bg:"#fff8e1",color:"#f57f17"}:{bg:"#fce4ec",color:"#c62828"}; };

function calcEarnings(l) {
  const rate = parseFloat(l.hourlyRate)||0;
  let h = 0;
  (l.daySchedules||[]).forEach(ds => {
    if(ds.from&&ds.to){
      const[fh,fm]=ds.from.split(":").map(Number);
      const[th,tm]=ds.to.split(":").map(Number);
      h += Math.max(0,(th+tm/60)-(fh+fm/60));
    }
  });
  const isGlobal = l.payModel==="גלובאלי" || l.type==="גלובאלי";
  return { hoursPerWeek: h.toFixed(1), monthly: Math.round(h*(isGlobal?4.33:4)*rate) };
}

const emptyLead = () => ({id:Date.now(),name:"",source:"",status:"חדש",score:"",address:"",type:"שעתי",childAge:"",daySchedules:[],hourlyRate:"",scheduleDate:"",scheduleDay:"",scheduleTime:"",cons:[],consOther:"",pros:"",checks:[],notes:""});
const emptyClient = () => ({id:Date.now(),name:"",childrenCount:"",daySchedules:[],type:"שעתי",shift:[],responsibilities:[],payModel:"שעתי",hourlyRate:"",manualSalary:"",notes:""});

const iStyle = {width:"100%",border:"1px solid #e0dbd0",borderRadius:7,padding:"7px 10px",fontSize:13,fontFamily:"inherit",background:"#fafafa",outline:"none",boxSizing:"border-box"};

function Sec({children,color="#c17b3f"}){return <div style={{fontSize:11,fontWeight:700,color,letterSpacing:0.8,marginTop:18,marginBottom:8,borderBottom:`1px solid ${color}33`,paddingBottom:4}}>{children}</div>}
function F({label,id,form,onChange,placeholder,type="text"}){return <div style={{marginBottom:10}}>{label&&<div style={{fontSize:11,color:"#888",marginBottom:3}}>{label}</div>}<input type={type} value={form[id]||""} onChange={e=>onChange(id,e.target.value)} placeholder={placeholder||""} style={iStyle}/></div>}
function G2({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{children}</div>}
function G3({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>{children}</div>}

function DayScheduler({schedules,onChange}){
  const[openDay,setOpenDay]=useState(null);
  const[tempFrom,setTempFrom]=useState("08:30");
  const[tempTo,setTempTo]=useState("15:30");
  const scheduled=schedules.map(s=>s.day);
  const click=day=>{
    if(scheduled.includes(day)){onChange(schedules.filter(s=>s.day!==day));if(openDay===day)setOpenDay(null);}
    else{setOpenDay(day);setTempFrom("08:30");setTempTo("15:30");}
  };
  const confirm=day=>{if(!tempFrom||!tempTo)return;onChange([...schedules,{day,from:tempFrom,to:tempTo}]);setOpenDay(null);};
  return <div style={{marginBottom:10}}>
    <div style={{fontSize:11,color:"#888",marginBottom:6}}>ימים מועדפים</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
      {WEEKDAYS.map(day=>{const sel=scheduled.includes(day);const sc=schedules.find(s=>s.day===day);return <button key={day} onClick={()=>click(day)} style={{border:sel?"2px solid #c17b3f":"1px solid #e0dbd0",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit",background:sel?"#fff3e0":"white",color:sel?"#c17b3f":"#555",fontWeight:sel?600:400}}>{day}{sc&&<span style={{fontSize:10,display:"block",color:"#888",fontWeight:400}}>{sc.from}–{sc.to}</span>}</button>})}
    </div>
    {openDay&&<div style={{background:"#fff8f0",border:"1px solid #f0c08a",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
      <div style={{fontSize:12,fontWeight:600,color:"#c17b3f",marginBottom:8}}>שעות ל{openDay}</div>
      <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
        <div style={{flex:1}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>התחלה</div><input type="time" value={tempFrom} onChange={e=>setTempFrom(e.target.value)} style={{...iStyle,width:"100%"}}/></div>
        <div style={{flex:1}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>סיום</div><input type="time" value={tempTo} onChange={e=>setTempTo(e.target.value)} style={{...iStyle,width:"100%"}}/></div>
        <button onClick={()=>confirm(openDay)} style={{background:"#c17b3f",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>אישור</button>
        <button onClick={()=>setOpenDay(null)} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
      </div>
    </div>}
  </div>;
}

function ConsSelector({cons,consOther,onChangeCons,onChangeOther}){
  const[inp,setInp]=useState("");
  const toggle=opt=>cons.includes(opt)?onChangeCons(cons.filter(c=>c!==opt)):onChangeCons([...cons,opt]);
  const hasOther=cons.includes("אחר");
  const otherTags=(()=>{try{return JSON.parse(consOther||"[]")}catch{return[]}})();
  const setOtherTags=t=>onChangeOther(JSON.stringify(t));
  const add=()=>{const v=inp.trim();if(!v)return;setOtherTags([...otherTags,v]);setInp("");};
  const allTags=[...cons.filter(c=>c!=="אחר").map(c=>({label:c,onRemove:()=>toggle(c)})),...otherTags.map((t,i)=>({label:t,onRemove:()=>setOtherTags(otherTags.filter((_,j)=>j!==i))}))];
  return <div style={{marginBottom:10}}>
    <div style={{fontSize:11,color:"#c62828",marginBottom:6,fontWeight:600}}>❌ חסרונות</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{CONS_OPTIONS.map(opt=>{const sel=cons.includes(opt);return <button key={opt} onClick={()=>toggle(opt)} style={{border:sel?"2px solid #c62828":"1px solid #e0dbd0",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit",background:sel?"#fce4ec":"white",color:sel?"#c62828":"#555",fontWeight:sel?600:400}}>{opt}</button>})}</div>
    {allTags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{allTags.map((t,i)=><span key={i} style={{background:"#fce4ec",color:"#c62828",borderRadius:6,padding:"3px 10px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>{t.label}<span onClick={t.onRemove} style={{cursor:"pointer",fontWeight:700,fontSize:14,lineHeight:1}}>×</span></span>)}</div>}
    {hasOther&&<div style={{display:"flex",gap:8}}><input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="הקלידי חיסרון ולחצי Enter..." style={{...iStyle,flex:1}}/><button onClick={add} style={{background:"#c62828",color:"white",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>הוסיפי</button></div>}
  </div>;
}

function CheckboxGroup({checks,onChange}){
  const toggle=opt=>checks.includes(opt)?onChange(checks.filter(c=>c!==opt)):onChange([...checks,opt]);
  return <div style={{marginBottom:10}}>
    <div style={{fontSize:11,color:"#555",marginBottom:6,fontWeight:600}}>דגשים שצויינו</div>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>{CHECKBOXES.map(opt=><label key={opt} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}><input type="checkbox" checked={checks.includes(opt)} onChange={()=>toggle(opt)} style={{width:15,height:15,accentColor:"#c17b3f",cursor:"pointer"}}/>{opt}</label>)}</div>
  </div>;
}

function LeadModal({lead,onSave,onClose,onDelete}){
  const[form,setForm]=useState({...lead});
  const upd=(id,val)=>setForm(f=>({...f,[id]:val}));
  const p={form,onChange:upd};
  const needsSchedule=STATUS_NEEDS_SCHEDULE.includes(form.status);
  const schedLabel=form.status==="נקבעה שיחת טלפון"?"היכרות טלפונית":"פגישה";
  const ear=calcEarnings(form);
  const daysCount=form.daySchedules?.length||0;
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
    <div style={{background:"white",borderRadius:16,padding:"1.8rem",width:560,maxWidth:"96vw",direction:"rtl",maxHeight:"92vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <h2 style={{fontSize:17,fontWeight:600,margin:0}}>{form.name||"ליד חדש"}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#aaa"}}>✕</button>
      </div>
      <Sec>1 · פרטים</Sec>
      <F label="שם" id="name" placeholder="שם המשפחה / איש הקשר" {...p}/>
      <F label="מקור" id="source" placeholder="פייסבוק, המלצה..." {...p}/>
      <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>סטטוס</div><select value={form.status} onChange={e=>upd("status",e.target.value)} style={iStyle}>{STATUSES.map(o=><option key={o}>{o}</option>)}</select></div>
      <Sec>4 · כתובת</Sec>
      <F label="כתובת" id="address" placeholder="רחוב, מספר, קומה, דירה" {...p}/>
      <Sec>5 · פרטי משרה</Sec>
      <G2>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>סוג משרה</div><select value={form.type} onChange={e=>upd("type",e.target.value)} style={iStyle}><option value="שעתי">שעתי</option><option value="גלובאלי">גלובאלי</option><option value="מזדמן">מזדמן</option></select></div>
        <F label="שם וגיל התינוק" id="childAge" placeholder="רון, 3 חודשים" {...p}/>
      </G2>
      <DayScheduler schedules={form.daySchedules||[]} onChange={ds=>upd("daySchedules",ds)}/>
      <G3>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>מספר ימים בשבוע</div><div style={{...iStyle,background:"#f0f0f0",display:"flex",alignItems:"center",fontSize:13,color:daysCount>0?"#1a1a1a":"#888"}}>{daysCount>0?`${daysCount} ימים`:"אוטומטי"}</div></div>
        <F label="תעריף לשעה (₪)" id="hourlyRate" placeholder="65" {...p}/>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>שכר חודשי משוער</div><div style={{...iStyle,background:ear.monthly>0?"#f0faf4":"#f0f0f0",display:"flex",alignItems:"center",fontSize:13,fontWeight:700,color:ear.monthly>0?"#2e7d32":"#888"}}>{ear.monthly>0?`₪${ear.monthly.toLocaleString()}`:"—"}</div></div>
      </G3>
      {needsSchedule&&<><Sec color="#6a1b9a">6 · {schedLabel}</Sec><G3>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#888",marginBottom:3}}>יום</div><select value={form.scheduleDay} onChange={e=>upd("scheduleDay",e.target.value)} style={iStyle}><option value="">בחרי</option>{WEEKDAYS.map(d=><option key={d}>{d}</option>)}</select></div>
        <F label="תאריך" id="scheduleDate" type="date" {...p}/>
        <F label="שעה" id="scheduleTime" type="time" {...p}/>
      </G3></>}
      <Sec color="#c62828">7 · חסרונות</Sec>
      <ConsSelector cons={form.cons||[]} consOther={form.consOther||""} onChangeCons={v=>upd("cons",v)} onChangeOther={v=>upd("consOther",v)}/>
      <Sec color="#2e7d32">8 · יתרונות</Sec>
      <div style={{marginBottom:10}}><textarea value={form.pros||""} onChange={e=>upd("pros",e.target.value)} placeholder="שכונה מצוינת, ניו בורן..." style={{...iStyle,minHeight:52,resize:"vertical"}}/></div>
      <Sec>9 · דגשים שצויינו</Sec>
      <CheckboxGroup checks={form.checks||[]} onChange={v=>upd("checks",v)}/>
      <Sec>10 · הערות</Sec>
      <div style={{marginBottom:10}}><textarea value={form.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="חברים משותפים, הרושם מהשיחה..." style={{...iStyle,minHeight:60,resize:"vertical"}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"1.2rem"}}>
        <button onClick={()=>onDelete(lead.id)} style={{background:"none",border:"1px solid #fcc",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",color:"#c62828",fontFamily:"inherit"}}>🗑 מחיקה</button>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"8px 18px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
          <button onClick={()=>onSave(form)} style={{background:"#1a1a1a",color:"white",border:"none",borderRadius:8,padding:"8px 18px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>שמירה</button>
        </div>
      </div>
    </div>
  </div>;
}

function LeadCard({lead,onClick}){
  const ear=calcEarnings(lead);const st=statusStyle[lead.status]||statusStyle["חדש"];const sc=scoreStyle(lead.score);
  const otherTags=(()=>{try{return JSON.parse(lead.consOther||"[]")}catch{return[]}})();
  const allConsTags=[...(lead.cons||[]).filter(c=>c!=="אחר"),...otherTags];
  return <div onClick={onClick} style={{background:"white",borderRadius:14,border:"1px solid #e8e4dc",padding:"1rem 1.2rem",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.1)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,0.04)"}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
      <div style={{fontWeight:600,fontSize:15}}>{lead.name||"ללא שם"}</div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {lead.score&&<span style={{...sc,width:26,height:26,borderRadius:"50%",display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12}}>{lead.score}</span>}
        <span style={{...st,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{lead.status}</span>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 12px",fontSize:12,color:"#555",marginBottom:8}}>
      {lead.address&&<div>📍 {lead.address}</div>}
      {lead.childAge&&<div>👶 {lead.childAge}</div>}
      {(lead.daySchedules||[]).length>0&&<div>📅 {lead.daySchedules.map(d=>d.day).join(", ")}</div>}
      {lead.scheduleDate&&<div>🗓 {lead.scheduleDate}</div>}
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
      <span style={{background:lead.type==="גלובאלי"?"#1a1a2e":lead.type==="מזדמן"?"#f3e5f5":"#e8eaf6",color:lead.type==="גלובאלי"?"#a5b4fc":lead.type==="מזדמן"?"#6a1b9a":"#283593",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:600}}>{lead.type}</span>
      {ear.monthly>0&&<span style={{fontWeight:700,color:"#2e7d32",fontSize:13}}>₪{ear.monthly.toLocaleString()}<span style={{fontWeight:400,fontSize:10,color:"#888",marginRight:3}}>/חודש</span></span>}
    </div>
    {lead.pros&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>{lead.pros.split(/[,،\n]/).map(s=>s.trim()).filter(Boolean).map((p,i)=><span key={i} style={{background:"#e8f5e9",color:"#2e7d32",borderRadius:5,padding:"1px 7px",fontSize:10}}>✓ {p}</span>)}</div>}
    {allConsTags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>{allConsTags.map((c,i)=><span key={i} style={{background:"#fce4ec",color:"#c62828",borderRadius:5,padding:"1px 7px",fontSize:10}}>{c}</span>)}</div>}
    {(lead.checks||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{lead.checks.map((c,i)=><span key={i} style={{background:"#fff8e1",color:"#f57f17",borderRadius:5,padding:"1px 7px",fontSize:10}}>! {c}</span>)}</div>}
  </div>;
}

function ClientModal({client,onSave,onClose,onDelete}){
  const[form,setForm]=useState({...client,shift:client.shift||[]});
  const upd=(id,val)=>setForm(f=>({...f,[id]:val}));
  const p={form,onChange:upd};
  const toggleResp=r=>{const cur=form.responsibilities||[];upd("responsibilities",cur.includes(r)?cur.filter(x=>x!==r):[...cur,r]);};
  const toggleShift=s=>{const cur=Array.isArray(form.shift)?form.shift:(form.shift?[form.shift]:[]);upd("shift",cur.includes(s)?cur.filter(x=>x!==s):[...cur,s]);};
  const rate=parseFloat(form.hourlyRate)||0;
  const hpw=parseFloat(calcEarnings(form).hoursPerWeek)||0;
  const isGlobal=form.payModel==="גלובאלי";
  const calcMonthly=isGlobal?Math.round(hpw*4.33*rate):Math.round(hpw*4*rate);
  const monthly=parseFloat(form.manualSalary)||calcMonthly;
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>

  const totalMonthly=selectedEntries.reduce((sum,e)=>{
    const rate=parseFloat(e.hourlyRate)||0;
    const hpw=parseFloat(calcEarnings(e).hoursPerWeek)||0;
    const isGlobal=e.payModel==="גלובאלי"||e.type==="גלובאלי";

  const schedule={};

            </div>

              const slots=schedule[day].filter(s=>sm(s.from)<toH*60&&sm(s.to)>fromH*60);

              return <div key={day} style={{position:"relative",height:sectionHeight,borderRight:"1px solid #f0ece4",borderLeft:"1px solid #f0ece4",borderTop:"1px solid #ddd",borderBottom:ti===0?"1px solid #ddd":"none"}}>

                {sectionHoursList.map(h=><div key={h} style={{position:"absolute",top:(h-fromH)*PX_PER_HOUR,width:"100%",borderTop:"1px solid #f5f2ed"}}/>)}
                {slots.map((slot,si)=>{
                  const clampedFrom=Math.max(sm(slot.from),fromH*60);
                  const clampedTo=Math.min(sm(slot.to),toH*60);
                  const top=(clampedFrom-fromH*60)/60*PX_PER_HOUR+4;

                  </div>;
                })}

            })}
          </div>
        </div>;
      })}
    </div>}

        {selectedEntries.length===0&&allEntries.length>0&&<div style={{textAlign:"center",padding:"3rem",color:"#bbb",fontSize:14}}>בחרי לקוחות מהרשימה למעלה כדי לראות את הלוח וההכנסה 📅</div>}

}

function isHoliday(date) {
  const holidays = [
    "2025-09-22","2025-09-23","2025-10-01","2025-10-02","2025-10-06","2025-10-07","2025-10-13","2025-10-14",
    "2026-09-11","2026-09-12","2026-09-20","2026-09-21","2026-09-25","2026-09-26","2026-10-02","2026-10-03",
    "2026-04-01","2026-04-02","2026-04-07","2026-04-08","2026-05-21","2026-05-22",
    "2025-04-12","2025-04-13","2025-04-18","2025-04-19","2025-06-01","2025-06-02",
  ];
  const d = date.toISOString().split("T")[0];
  return holidays.includes(d);
}

function getWeekDates(weekOffset) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - day + (weekOffset * 7));
  sunday.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(sunday);
    d.setDate(sunday.getDate()+i);
    return d;
  });
}

            <span style={{fontSize:10,color:"#888",fontWeight:600}}>חג</span>
          </div>}
          <div style={{fontSize:11,fontWeight:700,color:isToday?"#c17b3f":"#555",marginBottom:2}}>{HEB_DAYS[i]}</div>
          <div style={{fontSize:10,color:"#aaa",marginBottom:8}}>{d.getDate()}/{d.getMonth()+1}</div>
          {client&&<div style={{fontSize:11,fontWeight:600,color:"#333",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{client.name}</div>}
          {!isGlobal&&amountNum>0&&<div style={{fontSize:12,fontWeight:700,color:balance<=0?"#2e7d32":"#c62828"}}>
            {balance<=0?"✓ ":""}₪{paidNum>0?paidNum.toLocaleString():amountNum.toLocaleString()}
            {balance>0&&<span style={{fontSize:10,display:"block",color:"#c62828"}}>יתרה: ₪{balance.toLocaleString()}</span>}
          </div>}
          {isGlobal&&hasCooking&&entry.cooking&&<div style={{fontSize:10,color:"#666",marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🍳 {entry.cooking}</div>}
          {!entry.clientId&&!isShabat&&<div style={{fontSize:10,color:"#ddd",marginTop:8}}>+ הוסיפי</div>}
        </div>;
      })}
    </div>

    {/* Day modal */}
    {openDay&&<div onClick={e=>e.target===e.currentTarget&&setOpenDay(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:"white",borderRadius:16,padding:"1.8rem",width:400,maxWidth:"96vw",direction:"rtl"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:600,margin:0}}>{HEB_DAYS[openDay.getDay()]} {openDay.getDate()}/{openDay.getMonth()+1}</h3>
          <button onClick={()=>setOpenDay(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#aaa"}}>✕</button>
        </div>

        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"#888",marginBottom:3}}>לקוח</div>
          <select value={editEntry.clientId||""} onChange={e=>{const newClientId=e.target.value;const c2=clients.find(cc=>cc.id===newClientId||cc.id===parseInt(newClientId));const dayName2=HEB_DAYS[openDay.getDay()];const sched2=c2&&(c2.daySchedules||[]).find(ds=>ds.day===dayName2);let auto2=0;if(sched2&&c2&&c2.payModel!=="גלובאלי"){const r2=parseFloat(c2.hourlyRate)||0;const[fh2,fm2]=sched2.from.split(":").map(Number);const[th2,tm2]=sched2.to.split(":").map(Number);auto2=Math.round(((th2+tm2/60)-(fh2+fm2/60))*r2);}setEditEntry(v=>({...v,clientId:newClientId,amount:auto2?String(auto2):v.amount}));}} style={iStyle2}>
            <option value="">בחרי לקוח</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>

        {(()=>{
          const c=editEntry.clientId?getClient(editEntry.clientId):null;
          const isG=c&&c.payModel==="גלובאלי";
          const hasCook=c&&(c.responsibilities||[]).includes("בישול");
          const rate=parseFloat(c?.hourlyRate)||0;
          // calc daily amount from daySchedules for the selected day
          const dayName=HEB_DAYS[openDay.getDay()];
          const sched=c&&(c.daySchedules||[]).find(ds=>ds.day===dayName);
          let autoAmount=0;
          if(sched&&rate&&!isG){
            const[fh,fm]=sched.from.split(":").map(Number);
            const[th,tm]=sched.to.split(":").map(Number);
            autoAmount=Math.round(((th+tm/60)-(fh+fm/60))*rate);
          }
          if(autoAmount&&!editEntry.amount){
            // pre-fill
          }
          return <>
            {!isG&&c&&<>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"#888",marginBottom:3}}>סכום לתשלום (₪){autoAmount>0&&<span style={{color:"#c17b3f"}}> — אוטומטי: ₪{autoAmount}</span>}</div>
                <input value={editEntry.amount||""} onChange={e=>setEditEntry(v=>({...v,amount:e.target.value}))} placeholder={autoAmount?`${autoAmount}`:"0"} style={iStyle2}/>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"#888",marginBottom:3}}>שולם (₪)</div>
                <input value={editEntry.paid||""} onChange={e=>setEditEntry(v=>({...v,paid:e.target.value}))} placeholder="0" style={iStyle2}/>
              </div>
              {(()=>{
                const amt=parseFloat(editEntry.amount)||autoAmount;
                const paid=parseFloat(editEntry.paid)||0;
                const bal=amt-paid;
                if(!amt)return null;
                return <div style={{background:bal<=0?"#f0faf4":"#fce4ec",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:13,fontWeight:600,color:bal<=0?"#2e7d32":"#c62828"}}>
                  {bal<=0?"✓ שולם במלואו":`יתרה לתשלום: ₪${bal.toLocaleString()}`}
                </div>;
              })()}
            </>}
            {isG&&hasCook&&<div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:"#888",marginBottom:3}}>🍳 מה בישלתי היום</div>
              <textarea value={editEntry.cooking||""} onChange={e=>setEditEntry(v=>({...v,cooking:e.target.value}))} placeholder="שניצל, אורז, מרק..." style={{...iStyle2,minHeight:60,resize:"vertical"}}/>
            </div>}
          </>;
        })()}

        <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
          <button onClick={()=>{const k=dateKey(openDay);setEntries(e=>{const n={...e};delete n[k];return n;});setOpenDay(null);}} style={{background:"none",border:"1px solid #fcc",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",color:"#c62828",fontFamily:"inherit"}}>מחיקה</button>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setOpenDay(null)} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
            <button onClick={saveEntry} style={{background:"#1a1a1a",color:"white",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>שמירה</button>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

/* ── Requests Tab ── */
function RequestsTab({clients}) {
  const[monthOffset,setMonthOffset]=useState(0);
  const[requests,setRequestsRaw]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("nanny_requests")||"{}");}catch{return{};}
  });
  const[openDate,setOpenDate]=useState(null);
  const[editReq,setEditReq]=useState({});

  const setRequests=u=>{
    setRequestsRaw(p=>{
      const n=typeof u==="function"?u(p):u;
      try{localStorage.setItem("nanny_requests",JSON.stringify(n));
        window.saveToCloud&&window.saveToCloud("requests",n);}catch{};
      return n;
    });
  };

  const now=new Date();
  const year=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getFullYear();
  const month=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=firstDay.getDay();
  const daysInMonth=lastDay.getDate();

  const dateKey=d=>`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const getClient=id=>clients.find(c=>c.id===id||c.id===parseInt(id));

  const iStyle2={width:"100%",border:"1px solid #e0dbd0",borderRadius:7,padding:"7px 10px",fontSize:13,fontFamily:"inherit",background:"#fafafa",outline:"none",boxSizing:"border-box"};

  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  return <div>
    {/* Month nav */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,background:"white",borderRadius:12,padding:"12px 16px",border:"1px solid #e8e4dc"}}>
      <button onClick={()=>setMonthOffset(m=>m-1)} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"6px 14px",fontSize:18,cursor:"pointer"}}>‹</button>
      <div style={{fontSize:15,fontWeight:600,color:"#333"}}>{HEB_MONTHS[month]} {year}</div>
      <button onClick={()=>setMonthOffset(m=>m+1)} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"6px 14px",fontSize:18,cursor:"pointer"}}>›</button>
    </div>

    {/* Calendar grid */}
    <div style={{background:"white",borderRadius:14,border:"1px solid #e8e4dc",padding:"1rem",overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {HEB_DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#888",padding:"4px"}}>{d.slice(0,1)}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((d,i)=>{
          if(!d)return <div key={i}/>;
          const k=dateKey(d);
          const req=requests[k];
          const client=req?.clientId?getClient(req.clientId):null;
          const isToday=new Date().getDate()===d&&new Date().getMonth()===month&&new Date().getFullYear()===year;
          return <div key={k} onClick={()=>{setEditReq(requests[k]||{clientId:"",hours:"",allDay:false});setOpenDate({d,k});}}
            style={{minHeight:60,borderRadius:8,border:isToday?"2px solid #c17b3f":"1px solid #f0ece4",padding:"4px",cursor:"pointer",background:req?"#fff8f0":"white",transition:"background 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.background=req?"#fff3e0":"#fafafa"}
            onMouseLeave={e=>e.currentTarget.style.background=req?"#fff8f0":"white"}>
            <div style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?"#c17b3f":"#555"}}>{d}</div>
            {client&&<div style={{fontSize:9,fontWeight:600,color:"#c17b3f",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>⭐ {client.name}</div>}
            {req?.hours&&<div style={{fontSize:9,color:"#888"}}>{req.hours}</div>}
            {req?.allDay&&<div style={{fontSize:9,color:"#888"}}>כל היום</div>}
          </div>;
        })}
      </div>
    </div>

    {/* Request modal */}
    {openDate&&<div onClick={e=>e.target===e.currentTarget&&setOpenDate(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:"white",borderRadius:16,padding:"1.8rem",width:380,maxWidth:"96vw",direction:"rtl"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:600,margin:0}}>{openDate.d} {HEB_MONTHS[month]}</h3>
          <button onClick={()=>setOpenDate(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#aaa"}}>✕</button>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"#888",marginBottom:3}}>לקוח מבקש</div>
          <select value={editReq.clientId||""} onChange={e=>setEditReq(v=>({...v,clientId:e.target.value}))} style={iStyle2}>
            <option value="">בחרי לקוח</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div style={{marginBottom:10}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,marginBottom:8}}>
            <input type="checkbox" checked={editReq.allDay||false} onChange={e=>setEditReq(v=>({...v,allDay:e.target.checked}))} style={{width:15,height:15,accentColor:"#c17b3f"}}/>
            כל היום
          </label>
          {!editReq.allDay&&<><div style={{fontSize:11,color:"#888",marginBottom:3}}>שעות מבוקשות</div>
          <input value={editReq.hours||""} onChange={e=>setEditReq(v=>({...v,hours:e.target.value}))} placeholder="09:00–15:00" style={iStyle2}/></>}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
          <button onClick={()=>{setRequests(r=>{const n={...r};delete n[openDate.k];return n;});setOpenDate(null);}} style={{background:"none",border:"1px solid #fcc",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",color:"#c62828",fontFamily:"inherit"}}>מחיקה</button>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setOpenDate(null)} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
            <button onClick={()=>{setRequests(r=>({...r,[openDate.k]:editReq}));setOpenDate(null);}} style={{background:"#c17b3f",color:"white",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>שמירה</button>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}


function App(){
  const[tab,setTab]=useState("leads");
  const[leads,setLeadsRaw]=useState(()=>{try{const s=localStorage.getItem("nanny_leads");return s?JSON.parse(s):[]}catch{return[]}});
  const[clients,setClientsRaw]=useState(()=>{try{const s=localStorage.getItem("nanny_clients");return s?JSON.parse(s):[]}catch{return[]}});
  const[filterStatus,setFilterStatus]=useState("");const[filterType,setFilterType]=useState("");const[search,setSearch]=useState("");
  const[openLead,setOpenLead]=useState(null);const[openClient,setOpenClient]=useState(null);
  const setLeads=u=>setLeadsRaw(p=>{const n=typeof u==="function"?u(p):u;try{localStorage.setItem("nanny_leads",JSON.stringify(n));window.saveToCloud&&window.saveToCloud("leads",n);}catch{};return n;});
  const setClients=u=>setClientsRaw(p=>{const n=typeof u==="function"?u(p):u;try{localStorage.setItem("nanny_clients",JSON.stringify(n));window.saveToCloud&&window.saveToCloud("clients",n);}catch{};return n;});
  const addLead=()=>{const l=emptyLead();setLeads(ls=>[l,...ls]);setOpenLead(l);};
  const saveLead=u=>{setLeads(ls=>ls.map(l=>l.id===u.id?u:l));setOpenLead(null);};
  const deleteLead=id=>{setLeads(ls=>ls.filter(l=>l.id!==id));setOpenLead(null);};
  const addClient=()=>{const c=emptyClient();setClients(cs=>[c,...cs]);setOpenClient(c);};
  const saveClient=u=>{setClients(cs=>cs.map(c=>c.id===u.id?u:c));setOpenClient(null);};
  const deleteClient=id=>{setClients(cs=>cs.filter(c=>c.id!==id));setOpenClient(null);};
  const totalMonthly=leads.reduce((s,l)=>s+calcEarnings(l).monthly,0);
  const clientsMonthly=clients.reduce((s,c)=>{const r=parseFloat(c.hourlyRate)||0;const h=parseFloat(calcEarnings(c).hoursPerWeek)||0;const ig=c.payModel==="גלובאלי";const cm=ig?Math.round(h*4.33*r):Math.round(h*4*r);return s+(parseFloat(c.manualSalary)||cm);},0);
  const filtered=leads.filter(l=>(!filterStatus||l.status===filterStatus)&&(!filterType||l.type===filterType)&&(!search||(l.name||"").includes(search)||(l.address||"").includes(search)));
  const filteredClients=clients.filter(c=>!search||(c.name||"").includes(search));
  const btnStyle={background:"white",border:"1px solid #e0dbd0",borderRadius:8,padding:"8px 14px",fontSize:13,fontFamily:"inherit",cursor:"pointer",color:"#444"};
  return <div style={{direction:"rtl",fontFamily:"'Segoe UI',Arial,sans-serif",padding:"1.5rem",background:"#f5f3ee",minHeight:"100vh"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"1.2rem"}}>
      <h1 style={{fontWeight:300,fontSize:24,margin:0}}>ניהול <span style={{fontWeight:600,color:"#c17b3f"}}>לקוחות</span></h1>
      <span style={{fontSize:12,color:"#999"}}>נני — מרכז תל אביב</span>
    </div>
    <div style={{display:"flex",gap:0,marginBottom:"1.2rem",borderBottom:"2px solid #e8e4dc"}}>
      {[["leads","לידים 🎯"],["clients","לקוחות קיימים ✅"],["combine","שילוב לקוחות 📅"],["schedule","לו״ז שבועי 📆"],["requests","בקשות ⭐"]].map(([key,label])=>(
        <button key={key} onClick={()=>setTab(key)} style={{background:"none",border:"none",borderBottom:tab===key?"2px solid #c17b3f":"2px solid transparent",marginBottom:-2,padding:"10px 20px",fontSize:14,cursor:"pointer",fontFamily:"inherit",color:tab===key?"#c17b3f":"#888",fontWeight:tab===key?600:400}}>{label}</button>
      ))}
    </div>
    <div style={{display:"flex",gap:10,marginBottom:"1.2rem",flexWrap:"wrap"}}>
      {(tab==="leads"?[["סה״כ לידים",leads.length],["ציון 7+",leads.filter(l=>parseInt(l.score)>=7).length],["פגישות",leads.filter(l=>l.status.includes("פגישה")).length],["גויסתי",leads.filter(l=>l.status==="גויסתי").length],["💰 פוטנציאל","₪"+totalMonthly.toLocaleString()]]:tab==="clients"?[["לקוחות פעילים",clients.length],["💰 הכנסה חודשית","₪"+clientsMonthly.toLocaleString()]]:[]).map(([lbl,val])=>(
        <div key={lbl} style={{background:"white",borderRadius:10,padding:"10px 18px",border:"1px solid #e8e4dc"}}>
          <div style={{fontSize:20,fontWeight:600,color:"#c17b3f",lineHeight:1}}>{val}</div>
          <div style={{fontSize:11,color:"#888",marginTop:3}}>{lbl}</div>
        </div>
      ))}
    </div>
    {(tab==="leads"||tab==="clients")&&<div style={{display:"flex",gap:10,marginBottom:"1.2rem",flexWrap:"wrap",alignItems:"center"}}>
      {tab==="leads"?<>
        <button onClick={addLead} style={{background:"#1a1a1a",color:"white",border:"none",borderRadius:8,padding:"9px 18px",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>+ ליד חדש</button>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={btnStyle}><option value="">כל הסטטוסים</option>{STATUSES.map(o=><option key={o}>{o}</option>)}</select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={btnStyle}><option value="">כל הסוגים</option><option value="שעתי">שעתי</option><option value="גלובאלי">גלובאלי</option><option value="מזדמן">מזדמן</option></select>
      </>:<button onClick={addClient} style={{background:"#2e7d32",color:"white",border:"none",borderRadius:8,padding:"9px 18px",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>+ לקוח קיים</button>}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש שם..." style={{...btnStyle,width:180}}/>
    </div>}
    {tab==="schedule"?<ScheduleTab clients={clients}/>:tab==="requests"?<RequestsTab clients={clients}/>:tab==="combine"?<CombineTab leads={leads} clients={clients}/>:tab==="leads"?(filtered.length===0?<div style={{textAlign:"center",padding:"4rem",color:"#bbb",fontSize:15}}>לחצי על "+ ליד חדש" כדי להתחיל 🎯</div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",gap:14}}>{filtered.map(l=><LeadCard key={l.id} lead={l} onClick={()=>setOpenLead(l)}/>)}</div>):(filteredClients.length===0?<div style={{textAlign:"center",padding:"4rem",color:"#bbb",fontSize:15}}>לחצי על "+ לקוח קיים" ✅</div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",gap:14}}>{filteredClients.map(c=><ClientCard key={c.id} client={c} onClick={()=>setOpenClient(c)}/>)}</div>)}
    {openLead&&<LeadModal lead={leads.find(l=>l.id===openLead.id)||openLead} onSave={saveLead} onClose={()=>setOpenLead(null)} onDelete={deleteLead}/>}
    {openClient&&<ClientModal client={clients.find(c=>c.id===openClient.id)||openClient} onSave={saveClient} onClose={()=>setOpenClient(null)} onDelete={deleteClient}/>}
  </div>;
}

if (window.loadFromCloud) {
    window.loadFromCloud(() => {
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    });
  } else {
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  }
</script>
</body>
</html>
